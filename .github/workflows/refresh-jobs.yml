name: Refresh Job Snapshot

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-job-snapshot
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Render snapshot rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Request Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing repository secret: RENDER_DEPLOY_HOOK_URL" >&2
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
