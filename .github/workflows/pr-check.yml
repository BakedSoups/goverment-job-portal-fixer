name: PR Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pr-check:
    name: PR Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run PR checker
        run: sh scripts/pr-check.sh
